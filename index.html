<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>匿名お悩み相談室（試作品）</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col font-sans overflow-hidden">

    <header class="bg-indigo-600 text-white p-4 shadow-md text-center shrink-0">
        <h1 class="text-xl font-bold">ココロの匿名相談室</h1>
        <p class="text-xs text-indigo-200 mt-1">※この画面の会話は他の人には一切見えません</p>
    </header>

    <main id="chat-area" class="flex-1 p-4 overflow-y-auto max-w-2xl w-full mx-auto space-y-4">
        <div class="flex items-start">
            <div class="bg-white p-3 rounded-lg shadow-sm border border-gray-200 max-w-[80%] text-gray-700 text-sm">
                こんにちは。ここはあなただけの秘密の相談室です。誰にも言えないお悩みや、聴いてほしいことを何でも書き込んでくださいね。
            </div>
        </div>
    </main>

    <div class="bg-yellow-50 border-t border-yellow-200 p-2 text-center text-xs text-yellow-800 shrink-0">
        <span class="font-bold">【管理者デモ機能】</span>
        <button onclick="simulateReply()" class="bg-yellow-600 text-white px-2 py-1 rounded ml-2 hover:bg-yellow-700">
            回答者（あなた）として返信する
        </button>
    </div>

    <footer class="bg-white p-4 border-t border-gray-200 shadow-lg shrink-0">
        <div class="max-w-2xl w-full mx-auto flex gap-2">
            <textarea id="message-input" rows="1" placeholder="ここにお悩みを入力..." class="flex-1 border border-gray-300 rounded-lg p-2 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
            <button onclick="sendMessage()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-indigo-700 transition">
                送信
            </button>
        </div>
    </footer>

    <script>
        window.onload = function() {
            loadChatHistory();
        };

        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            saveMessage(text, 'user');

            input.value = '';
        }

        function addMessage(text, sender) {
            const chatArea = document.getElementById('chat-area');
            const messageWrapper = document.createElement('div');
            messageWrapper.classList.add('flex', 'items-start', sender === 'user' ? 'justify-end' : 'justify-start');

            const messageBox = document.createElement('div');
            messageBox.innerText = text;
            messageBox.classList.add('p-3', 'rounded-lg', 'shadow-sm', 'text-sm', 'max-w-[80%]');

            if (sender === 'user') {
                messageBox.classList.add('bg-indigo-500', 'text-white');
            } else {
                messageBox.classList.add('bg-white', 'text-gray-700', 'border', 'border-gray-200');
            }

            messageWrapper.appendChild(messageBox);
            chatArea.appendChild(messageWrapper);

            // メッセージが追加されたら自動で一番下までスクロールさせる
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function saveMessage(text, sender) {
            let history = JSON.parse(localStorage.getItem('chat_history')) || [];
            history.push({ text: text, sender: sender });
            localStorage.setItem('chat_history', JSON.stringify(history));
        }

        function loadChatHistory() {
            let history = JSON.parse(localStorage.getItem('chat_history')) || [];
            history.forEach(msg => {
                addMessage(msg.text, msg.sender);
            });
        }

        function simulateReply() {
            const replyText = prompt("回答者（あなた）からのメッセージを入力してください：");
            if (!replyText) return;
            
            addMessage(replyText, 'admin');
            saveMessage(replyText, 'admin');
        }
    </script>
</body>
</html>
